services:
  backend:
    build:
      context: ./backend
    container_name: documind-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ./backend/uploads:/app/uploads
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: documind-postgres
    environment:
      POSTGRES_USER: documind
      POSTGRES_PASSWORD: documind_password
      POSTGRES_DB: documind_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documind -d documind_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: documind-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: documind-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "no"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
  huggingface_cache: